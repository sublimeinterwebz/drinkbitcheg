<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0b0f">
  <title>DrinkBitch</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --accent: #4dffa0;
      --accent-glow: rgba(77, 255, 160, 0.15);
      --accent-border: rgba(77, 255, 160, 0.25);
      --danger: #ff4f6d;
      --warning: #ffb84f;
      --info: #4fc3ff;
      --text: #eeeef5;
      --muted: #6b6b88;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --r: 14px;
      --r-sm: 10px;
      --nav-h: 64px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
    }

    /* ── LOADING ─────────────────────────────── */
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 20px;
    }

    .loading-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 3px;
      color: var(--accent);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── AUTH SCREEN ─────────────────────────── */
    #auth-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 40px 28px;
      text-align: center;
    }

    .auth-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      letter-spacing: 4px;
      color: var(--accent);
      line-height: 1;
    }

    .auth-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      margin-bottom: 56px;
      letter-spacing: 0.03em;
    }

    .auth-ring {
      margin-bottom: 56px;
      opacity: 0.35;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 280px;
      padding: 15px 28px;
      background: var(--surface2);
      border: 1px solid var(--border-hover);
      border-radius: 50px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-google:hover { background: var(--surface); border-color: rgba(255,255,255,0.2); }
    .btn-google:active { transform: scale(0.97); }

    /* ── MAIN APP ────────────────────────────── */
    #main-screen {
      display: none;
      padding-bottom: calc(var(--nav-h) + var(--safe-b) + 20px);
    }

    /* ── HEADER ──────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 20px 0;
    }

    .app-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .header-date { font-size: 12px; color: var(--muted); }

    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--accent-border);
      cursor: pointer;
      object-fit: cover;
    }

    /* ── RING ────────────────────────────────── */
    .ring-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 16px;
    }

    .ring-wrap { position: relative; width: 210px; height: 210px; }

    .ring-svg { transform: rotate(-90deg); display: block; }

    .ring-track { fill: none; stroke: var(--surface2); stroke-width: 13; }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 13;
      stroke-linecap: round;
      stroke-dasharray: 565.49;
      stroke-dashoffset: 565.49;
      transition: stroke-dashoffset 0.9s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s;
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-pct {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: var(--text);
      letter-spacing: 1px;
      line-height: 1;
    }

    .ring-net { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .ring-goal { font-size: 11px; color: var(--muted); margin-top: 1px; letter-spacing: 0.04em; }

    .status-pill {
      margin-top: 14px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 20px;
    }

    /* ── STATS ───────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 16px 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    /* ── SECTION HEADER ──────────────────────── */
    .section-header {
      padding: 0 16px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── ENTRIES LIST ────────────────────────── */
    .entries-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .entry-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 12px 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .entry-emoji { font-size: 26px; flex-shrink: 0; }

    .entry-info { flex: 1; min-width: 0; }

    .entry-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .entry-net {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--accent);
      text-align: right;
      flex-shrink: 0;
    }

    .entry-net-sub { font-size: 10px; color: var(--muted); text-align: right; }

    .entry-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 4px;
      font-size: 14px;
      flex-shrink: 0;
      transition: color 0.15s;
      line-height: 1;
    }

    .entry-del:hover { color: var(--danger); }

    /* ── EMPTY STATE ─────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 44px; opacity: 0.3; margin-bottom: 12px; }
    .empty-text { font-size: 14px; line-height: 1.7; }

    /* ── SETTINGS VIEW ───────────────────────── */
    #settings-view {
      padding: 0 16px;
    }

    .settings-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 0 20px;
    }

    .btn-back-nav {
      background: var(--surface2);
      border: none;
      color: var(--muted);
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .settings-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      letter-spacing: 1.5px;
    }

    .settings-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .settings-row:last-child { border-bottom: none; }

    .settings-row-label { font-size: 14px; font-weight: 500; }

    .settings-row-hint { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .settings-goal { font-size: 12px; color: var(--accent); margin-top: 3px; }

    .settings-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      width: 76px;
      text-align: center;
      outline: none;
      flex-shrink: 0;
    }

    .settings-input:focus { border-color: var(--accent); }

    .btn-signout {
      width: 100%;
      padding: 15px;
      background: none;
      border: 1px solid rgba(255, 79, 109, 0.25);
      border-radius: var(--r-sm);
      color: var(--danger);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    .btn-signout:hover { background: rgba(255, 79, 109, 0.07); }

    /* ── BOTTOM NAV ──────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: calc(var(--nav-h) + var(--safe-b));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding-top: 6px;
      z-index: 200;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 0;
      border: none;
      background: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: color 0.15s;
    }

    .nav-btn.active { color: var(--accent); }

    .nav-icon { width: 22px; height: 22px; }

    /* ── FAB ─────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-b) + 16px);
      right: calc(50% - 215px + 16px);
      width: 54px; height: 54px;
      border-radius: 50%;
      background: var(--accent);
      color: #0b0b0f;
      font-size: 30px;
      font-weight: 300;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      transition: transform 0.15s;
      box-shadow: 0 0 24px rgba(77, 255, 160, 0.35);
    }

    .fab:active { transform: scale(0.9); }

    @media (max-width: 430px) {
      .fab { right: 16px; }
    }

    /* ── MODAL / BOTTOM SHEET ────────────────── */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .backdrop.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(102%);
      width: 100%;
      max-width: 430px;
      max-height: 88dvh;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 400;
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
    }

    .sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 10px;
      flex-shrink: 0;
    }

    .sheet-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .sheet-close {
      background: var(--surface2);
      border: none;
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .sheet-body { overflow-y: auto; flex: 1; padding-bottom: 28px; }

    /* ── CATEGORY TABS ───────────────────────── */
    .cat-tabs {
      display: flex;
      gap: 6px;
      padding: 0 16px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    .cat-tabs::-webkit-scrollbar { display: none; }

    .cat-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .cat-tab.active {
      background: var(--accent-glow);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ── BEVERAGE GRID ───────────────────────── */
    .bev-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 16px;
    }

    .bev-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 14px 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .bev-card:hover { border-color: var(--border-hover); }

    .bev-card.selected {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .bev-emoji { font-size: 30px; margin-bottom: 7px; }

    .bev-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 3px;
    }

    .bev-coef { font-size: 10px; color: var(--muted); }

    .sheet-cta {
      padding: 14px 16px 0;
    }

    /* ── VOLUME STEP ─────────────────────────── */
    .vol-section { padding: 0 16px; }

    .bev-preview {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface2);
      border-radius: var(--r-sm);
      padding: 14px;
      margin-bottom: 18px;
    }

    .bev-preview-emoji { font-size: 34px; }

    .bev-preview-name { font-size: 14px; font-weight: 500; }

    .bev-preview-coef { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .vol-presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .vol-btn {
      padding: 13px 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .vol-btn.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }

    .custom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .custom-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
    }

    .custom-input:focus { border-color: var(--accent); }

    .net-preview {
      background: var(--accent-glow);
      border: 1px solid var(--accent-border);
      border-radius: var(--r-sm);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--accent);
      text-align: center;
      line-height: 1.5;
    }

    .btn-confirm {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0b0b0f;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .btn-confirm:active { transform: scale(0.98); opacity: 0.9; }

    .btn-back-sheet {
      display: block;
      width: 100%;
      padding: 10px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      margin-top: 6px;
    }

    /* ── TOAST ───────────────────────────────── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-90px);
      background: var(--surface2);
      border: 1px solid var(--border-hover);
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      white-space: nowrap;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { color: var(--accent); border-color: var(--accent-border); }
    .toast.error { color: var(--danger); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loading-logo">DrinkBitch</div>
    <div class="spinner"></div>
  </div>

  <!-- Auth -->
  <div id="auth-screen">
    <div class="auth-logo">DrinkBitch</div>
    <div class="auth-sub">track everything you drink, not just water</div>
    <svg class="auth-ring" width="160" height="160" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="90" fill="none" stroke="#1c1c22" stroke-width="13"/>
      <circle cx="100" cy="100" r="90" fill="none" stroke="#4dffa0" stroke-width="13"
              stroke-linecap="round" stroke-dasharray="565" stroke-dashoffset="180"
              transform="rotate(-90 100 100)"/>
    </svg>
    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66 2.84-.01-.68z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- Main -->
  <div id="main-screen">

    <!-- Dashboard -->
    <div id="dashboard-view">
      <div class="app-header">
        <div>
          <div class="app-logo">DrinkBitch</div>
          <div class="header-date" id="header-date"></div>
        </div>
        <img class="user-avatar" id="user-avatar" src="" alt="" onclick="switchView('settings')" style="display:none">
      </div>

      <div class="ring-section">
        <div class="ring-wrap">
          <svg class="ring-svg" width="210" height="210" viewBox="0 0 210 210">
            <circle class="ring-track" cx="105" cy="105" r="90"/>
            <circle class="ring-progress" id="ring-prog" cx="105" cy="105" r="90"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct" id="ring-pct">0%</div>
            <div class="ring-net" id="ring-net">0ml hydrated</div>
            <div class="ring-goal" id="ring-goal">of 0ml goal</div>
          </div>
        </div>
        <div class="status-pill" id="status-pill"></div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total in</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Drinks</div>
          <div class="stat-value" id="stat-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Remaining</div>
          <div class="stat-value" id="stat-rem" style="color:var(--warning)">—</div>
        </div>
      </div>

      <div class="section-header">Today's drinks</div>
      <div class="entries-list" id="entries-list">
        <div class="empty-state">
          <div class="empty-icon">🥤</div>
          <div class="empty-text">Nothing logged yet<br>Tap + to add your first drink</div>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div id="settings-view" style="display:none">
      <div class="settings-header">
        <button class="btn-back-nav" onclick="switchView('dashboard')">←</button>
        <div class="settings-title">Settings</div>
      </div>

      <div class="settings-group">
        <div class="settings-row">
          <div>
            <div class="settings-row-label">Body weight</div>
            <div class="settings-row-hint">Used to calculate your daily goal</div>
            <div class="settings-goal" id="goal-display"></div>
          </div>
          <div style="display:flex;align-items:center;gap:7px;flex-shrink:0">
            <input type="number" class="settings-input" id="weight-input"
                   min="30" max="300" value="70" oninput="onWeightChange(this.value)">
            <span style="font-size:13px;color:var(--muted)">kg</span>
          </div>
        </div>
      </div>

      <div class="settings-group">
        <div class="settings-row">
          <div>
            <div class="settings-row-label">Account</div>
            <div class="settings-row-hint" id="settings-email"></div>
          </div>
        </div>
      </div>

      <button class="btn-signout" onclick="doSignOut()">Sign out</button>
    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-home" onclick="switchView('dashboard')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Today
      </button>
      <button class="nav-btn" id="nav-settings" onclick="switchView('settings')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        Settings
      </button>
    </nav>

    <!-- FAB -->
    <button class="fab" id="fab" onclick="openLogger()">+</button>
  </div>

  <!-- Logger sheet -->
  <div class="backdrop" id="backdrop" onclick="closeLogger()"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheet-title">Log a drink</div>
      <button class="sheet-close" onclick="closeLogger()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ─── PASTE YOUR FIREBASE CONFIG HERE ────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBiYbcBskxu_hx9AiuIF2KrmAix1Cj5L4k",
  authDomain: "drinkbitch-ccbf0.firebaseapp.com",
  projectId: "drinkbitch-ccbf0",
  storageBucket: "drinkbitch-ccbf0.firebasestorage.app",
  messagingSenderId: "689045611191",
  appId: "1:689045611191:web:fc062d7646824d1228e332",
  measurementId: "G-RN287VZHV6"
};
// ─────────────────────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ─── BEVERAGE DATA ────────────────────────────────────────────────────────────
const BEVS = [
  // Water
  { id:'water',       name:'Water',           emoji:'💧', cat:'water',   coef:1.00, defMl:250 },
  { id:'sparkling',   name:'Sparkling water', emoji:'🫧', cat:'water',   coef:1.00, defMl:330 },
  { id:'coconut',     name:'Coconut water',   emoji:'🥥', cat:'water',   coef:0.95, defMl:250 },
  // Hot drinks
  { id:'coffee',      name:'Black coffee',    emoji:'☕', cat:'hot',     coef:0.82, defMl:240 },
  { id:'espresso',    name:'Espresso',        emoji:'☕', cat:'hot',     coef:0.80, defMl:30  },
  { id:'latte',       name:'Latte',           emoji:'🥛', cat:'hot',     coef:0.85, defMl:300 },
  { id:'green-tea',   name:'Green tea',       emoji:'🍵', cat:'hot',     coef:0.95, defMl:240 },
  { id:'black-tea',   name:'Black tea',       emoji:'🍵', cat:'hot',     coef:0.90, defMl:240 },
  { id:'herbal-tea',  name:'Herbal tea',      emoji:'🫖', cat:'hot',     coef:0.98, defMl:240 },
  // Soft drinks
  { id:'cola',        name:'Cola',            emoji:'🥤', cat:'soft',    coef:0.85, defMl:330 },
  { id:'lemonade',    name:'Lemonade',        emoji:'🍋', cat:'soft',    coef:0.88, defMl:330 },
  { id:'energy',      name:'Energy drink',    emoji:'⚡', cat:'soft',    coef:0.78, defMl:250 },
  { id:'soda',        name:'Soda water',      emoji:'🫙', cat:'soft',    coef:1.00, defMl:330 },
  // Juice
  { id:'oj',          name:'Orange juice',    emoji:'🍊', cat:'juice',   coef:0.88, defMl:250 },
  { id:'apple-j',     name:'Apple juice',     emoji:'🍎', cat:'juice',   coef:0.88, defMl:250 },
  { id:'smoothie',    name:'Smoothie',        emoji:'🍓', cat:'juice',   coef:0.85, defMl:350 },
  { id:'tomato-j',    name:'Tomato juice',    emoji:'🍅', cat:'juice',   coef:0.94, defMl:200 },
  // Dairy
  { id:'milk',        name:'Milk',            emoji:'🥛', cat:'dairy',   coef:0.90, defMl:250 },
  { id:'oat-milk',    name:'Oat milk',        emoji:'🥛', cat:'dairy',   coef:0.90, defMl:250 },
  { id:'yogurt-d',    name:'Yogurt drink',    emoji:'🥣', cat:'dairy',   coef:0.88, defMl:200 },
  // Sports
  { id:'sports',      name:'Sports drink',    emoji:'🏃', cat:'sports',  coef:0.98, defMl:500 },
  { id:'protein',     name:'Protein shake',   emoji:'💪', cat:'sports',  coef:0.85, defMl:300 },
  // Alcohol
  { id:'beer',        name:'Beer',            emoji:'🍺', cat:'alcohol', coef:0.93, defMl:330 },
  { id:'wine',        name:'Wine',            emoji:'🍷', cat:'alcohol', coef:0.85, defMl:150 },
  { id:'cocktail',    name:'Cocktail',        emoji:'🍹', cat:'alcohol', coef:0.75, defMl:200 },
  { id:'spirits',     name:'Spirits',         emoji:'🥃', cat:'alcohol', coef:0.60, defMl:40  },
];

const CATS = [
  { id:'all',     label:'All' },
  { id:'water',   label:'Water' },
  { id:'hot',     label:'Hot drinks' },
  { id:'soft',    label:'Soft drinks' },
  { id:'juice',   label:'Juice' },
  { id:'dairy',   label:'Dairy' },
  { id:'sports',  label:'Sports' },
  { id:'alcohol', label:'Alcohol' },
];

// ─── UTILS ────────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split('T')[0];
const calcGoal = kg => Math.round(kg * 35);
const calcNet  = (ml, coef) => Math.round(ml * coef);
const calcPct  = (net, goal) => goal > 0 ? Math.min(100, Math.round((net / goal) * 100)) : 0;
const fmtMl    = ml => ml >= 1000 ? (ml / 1000).toFixed(1) + 'L' : ml + 'ml';

function statusFor(pct) {
  if (pct < 25) return { label:'Critical',       color:'#ff4f6d', bg:'rgba(255,79,109,0.12)'  };
  if (pct < 50) return { label:'Low',            color:'#ffb84f', bg:'rgba(255,184,79,0.12)'  };
  if (pct < 80) return { label:'Getting there',  color:'#4fc3ff', bg:'rgba(79,195,255,0.12)'  };
  return           { label:'Hydrated!',       color:'#4dffa0', bg:'rgba(77,255,160,0.12)'  };
}

function timeAgo(ts) {
  if (!ts?.toDate) return 'just now';
  const mins = Math.floor((Date.now() - ts.toDate().getTime()) / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  return `${Math.floor(mins / 60)}h ago`;
}

// ─── APP STATE ────────────────────────────────────────────────────────────────
let S = {
  user: null,
  entries: [],
  settings: { weightKg: 70 },
  view: 'dashboard',
  logStep: 1,
  selBev: null,
  selVol: 250,
  selCat: 'all',
  unsubEntries: null,
  unsubSettings: null,
};

// ─── FIRESTORE ────────────────────────────────────────────────────────────────
function subEntries(uid) {
  if (S.unsubEntries) S.unsubEntries();
  const today = todayStr();
  S.unsubEntries = db
    .collection('users').doc(uid)
    .collection('entries')
    .orderBy('timestamp', 'desc')
    .onSnapshot(snap => {
      S.entries = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(e => e.date === today);
      renderDash();
    }, err => console.warn('Firestore entries error:', err));
}

function subSettings(uid) {
  if (S.unsubSettings) S.unsubSettings();
  S.unsubSettings = db
    .collection('users').doc(uid)
    .collection('settings').doc('profile')
    .onSnapshot(snap => {
      if (snap.exists) S.settings = { weightKg: 70, ...snap.data() };
      document.getElementById('weight-input').value = S.settings.weightKg;
      updateGoalDisplay();
      renderDash();
    });
}

async function addEntry(bevId, volMl) {
  const bev = BEVS.find(b => b.id === bevId);
  await db.collection('users').doc(S.user.uid).collection('entries').add({
    beverageId: bevId,
    beverageName: bev.name,
    emoji: bev.emoji,
    volumeMl: volMl,
    netHydrationMl: calcNet(volMl, bev.coef),
    date: todayStr(),
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

async function removeEntry(id) {
  await db.collection('users').doc(S.user.uid).collection('entries').doc(id).delete();
}

async function saveSettings(data) {
  await db.collection('users').doc(S.user.uid)
    .collection('settings').doc('profile')
    .set(data, { merge: true });
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function signInGoogle() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function doSignOut() {
  if (S.unsubEntries)  S.unsubEntries();
  if (S.unsubSettings) S.unsubSettings();
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  document.getElementById('loading-screen').style.display = 'none';
  if (user) {
    S.user = user;
    show('main-screen');
    hide('auth-screen');
    const av = document.getElementById('user-avatar');
    if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
    document.getElementById('settings-email').textContent = user.email;
    updateHeaderDate();
    subEntries(user.uid);
    subSettings(user.uid);
  } else {
    S.user = null;
    hide('main-screen');
    show('auth-screen', 'flex');
  }
});

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderDash() {
  const goal      = S.settings.dailyGoalMl || calcGoal(S.settings.weightKg || 70);
  const totalFluid = S.entries.reduce((s, e) => s + (e.volumeMl || 0), 0);
  const net       = S.entries.reduce((s, e) => s + (e.netHydrationMl || 0), 0);
  const pct       = calcPct(net, goal);
  const remaining = Math.max(0, goal - net);
  const st        = statusFor(pct);

  // Ring
  const circ   = 2 * Math.PI * 90;
  const offset = circ - (pct / 100) * circ;
  const prog   = document.getElementById('ring-prog');
  prog.style.strokeDashoffset = offset;
  prog.style.stroke           = st.color;

  document.getElementById('ring-pct').textContent  = pct + '%';
  document.getElementById('ring-net').textContent  = fmtMl(net) + ' hydrated';
  document.getElementById('ring-goal').textContent = 'of ' + fmtMl(goal) + ' goal';

  const pill = document.getElementById('status-pill');
  pill.textContent       = st.label;
  pill.style.color       = st.color;
  pill.style.background  = st.bg;

  // Stats
  document.getElementById('stat-total').textContent = fmtMl(totalFluid);
  document.getElementById('stat-count').textContent = S.entries.length;
  const remEl = document.getElementById('stat-rem');
  remEl.textContent  = remaining > 0 ? fmtMl(remaining) : 'Done!';
  remEl.style.color  = remaining > 0 ? 'var(--warning)' : 'var(--accent)';

  // Entries
  const list = document.getElementById('entries-list');
  if (!S.entries.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🥤</div><div class="empty-text">Nothing logged yet<br>Tap + to add your first drink</div></div>`;
    return;
  }
  list.innerHTML = S.entries.map(e => `
    <div class="entry-card">
      <div class="entry-emoji">${e.emoji}</div>
      <div class="entry-info">
        <div class="entry-name">${e.beverageName}</div>
        <div class="entry-meta">${fmtMl(e.volumeMl)} · ${timeAgo(e.timestamp)}</div>
      </div>
      <div>
        <div class="entry-net">${fmtMl(e.netHydrationMl)}</div>
        <div class="entry-net-sub">net</div>
      </div>
      <button class="entry-del" onclick="delEntry('${e.id}')">✕</button>
    </div>`).join('');
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function switchView(v) {
  S.view = v;
  const isDash = v === 'dashboard';
  document.getElementById('dashboard-view').style.display = isDash ? 'block' : 'none';
  document.getElementById('settings-view').style.display  = isDash ? 'none' : 'block';
  document.getElementById('nav-home').classList.toggle('active', isDash);
  document.getElementById('nav-settings').classList.toggle('active', !isDash);
  document.getElementById('fab').style.display = isDash ? 'flex' : 'none';
}

// ─── LOGGER ───────────────────────────────────────────────────────────────────
function openLogger() {
  S.logStep = 1;
  S.selBev  = null;
  S.selVol  = 250;
  S.selCat  = 'all';
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  renderLogger();
}

function closeLogger() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function renderLogger() {
  document.getElementById('sheet-title').textContent =
    S.logStep === 1 ? 'What did you drink?' : 'How much?';

  const body = document.getElementById('sheet-body');

  if (S.logStep === 1) {
    const filtered = S.selCat === 'all' ? BEVS : BEVS.filter(b => b.cat === S.selCat);
    body.innerHTML = `
      <div class="cat-tabs">
        ${CATS.map(c => `<button class="cat-tab ${S.selCat === c.id ? 'active' : ''}"
          onclick="setCat('${c.id}')">${c.label}</button>`).join('')}
      </div>
      <div class="bev-grid">
        ${filtered.map(b => `
          <div class="bev-card ${S.selBev?.id === b.id ? 'selected' : ''}"
               onclick="pickBev('${b.id}')">
            <div class="bev-emoji">${b.emoji}</div>
            <div class="bev-name">${b.name}</div>
            <div class="bev-coef">${Math.round(b.coef * 100)}%</div>
          </div>`).join('')}
      </div>
      ${S.selBev ? `<div class="sheet-cta"><button class="btn-confirm" onclick="goStep2()">Next — pick volume</button></div>` : ''}`;
  } else {
    const bev    = S.selBev;
    const vol    = S.selVol;
    const net    = calcNet(vol, bev.coef);
    const presets = [150, 250, 330, 500, 750];
    const isCustom = !presets.includes(vol);

    body.innerHTML = `
      <div class="vol-section">
        <div class="bev-preview">
          <div class="bev-preview-emoji">${bev.emoji}</div>
          <div>
            <div class="bev-preview-name">${bev.name}</div>
            <div class="bev-preview-coef">${Math.round(bev.coef * 100)}% hydration coefficient</div>
          </div>
        </div>
        <div class="vol-presets">
          ${presets.map(v => `<button class="vol-btn ${vol === v ? 'active' : ''}"
            onclick="pickVol(${v})">${v}ml</button>`).join('')}
          <button class="vol-btn ${isCustom ? 'active' : ''}" onclick="focusCustom()">Custom</button>
        </div>
        <div class="custom-row">
          <input type="number" class="custom-input" id="custom-vol"
                 placeholder="Enter ml" min="1" max="5000"
                 value="${isCustom ? vol : ''}"
                 oninput="pickVol(parseInt(this.value)||0)">
          <span style="font-size:13px;color:var(--muted)">ml</span>
        </div>
        <div class="net-preview">
          ${vol > 0 ? `${vol}ml of ${bev.name} = <strong>${net}ml</strong> net hydration` : 'Enter a volume above'}
        </div>
        <button class="btn-confirm" onclick="confirmLog()" ${vol <= 0 ? 'disabled style="opacity:0.4"' : ''}>Log it</button>
        <button class="btn-back-sheet" onclick="goStep1()">← Back</button>
      </div>`;
  }
}

function setCat(c) { S.selCat = c; renderLogger(); }

function pickBev(id) {
  S.selBev = BEVS.find(b => b.id === id);
  S.selVol = S.selBev.defMl;
  renderLogger();
}

function pickVol(v) { S.selVol = v; renderLogger(); }
function goStep2()  { S.logStep = 2; renderLogger(); }
function goStep1()  { S.logStep = 1; renderLogger(); }
function focusCustom() { setTimeout(() => document.getElementById('custom-vol')?.focus(), 50); }

async function confirmLog() {
  if (!S.selBev || S.selVol <= 0) return;
  try {
    await addEntry(S.selBev.id, S.selVol);
    closeLogger();
    toast(`${S.selBev.emoji} Logged!`, 'success');
  } catch(e) {
    toast('Could not save. Try again.', 'error');
  }
}

async function delEntry(id) {
  try {
    await removeEntry(id);
    toast('Removed', '');
  } catch(e) {
    toast('Could not remove.', 'error');
  }
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function onWeightChange(val) {
  const kg = parseFloat(val) || 70;
  S.settings.weightKg = kg;
  updateGoalDisplay();
  saveSettings({ weightKg: kg });
  renderDash();
}

function updateGoalDisplay() {
  const kg = S.settings.weightKg || 70;
  document.getElementById('goal-display').textContent =
    `Daily goal: ${fmtMl(calcGoal(kg))} / day`;
}

function updateHeaderDate() {
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type}`;
  clearTimeout(_toastTimer);
  requestAnimationFrame(() => {
    el.classList.add('show');
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  });
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function show(id, display = 'block') { document.getElementById(id).style.display = display; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
